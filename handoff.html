<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI for Work — Karan Kumar</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #2e054e;
      font-family: 'Jost', 'Proxima Nova', Arial, sans-serif;
      overflow: hidden;
    }

    /* Subtle noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(99,0,163,0.35) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(237,38,79,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .stage {
      position: relative;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px;
      gap: 0;
    }

    /* Top section label */
    .section-label {
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      font-weight: 600;
      margin-bottom: 36px;
      animation: fadeUp 0.6s ease backwards;
    }

    /* Divider line */
    .divider {
      width: 48px;
      height: 3px;
      background: #ed264f;
      border-radius: 2px;
      margin: 0 auto 36px;
      animation: fadeUp 0.6s 0.1s ease backwards;
    }

    /* Name */
    .name {
      font-size: clamp(52px, 6vw, 80px);
      font-weight: 800;
      color: #ffffff;
      line-height: 1.0;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
      animation: fadeUp 0.7s 0.15s ease backwards;
    }

    /* Title */
    .title {
      font-size: clamp(18px, 2.2vw, 26px);
      font-weight: 500;
      color: rgba(255,255,255,0.55);
      margin-bottom: 56px;
      animation: fadeUp 0.7s 0.25s ease backwards;
    }

    /* Section badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(237,38,79,0.15);
      border: 1px solid rgba(237,38,79,0.35);
      border-radius: 999px;
      padding: 10px 24px;
      font-size: 15px;
      font-weight: 700;
      color: #f9849a;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 56px;
      animation: fadeUp 0.7s 0.35s ease backwards;
    }
    .badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ed264f;
      animation: pulse 1.8s ease-in-out infinite;
    }

    /* Launch button */
    .launch-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #ed264f;
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 18px 40px;
      font-size: 18px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.3px;
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 32px rgba(237,38,79,0.35);
      animation: fadeUp 0.7s 0.5s ease backwards;
    }
    .launch-btn:hover {
      transform: translateY(-2px);
      background: #c41c3f;
      box-shadow: 0 12px 40px rgba(237,38,79,0.5);
    }
    .launch-btn:active { transform: translateY(0); }
    .launch-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

    /* Countdown */
    .countdown {
      margin-top: 28px;
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.5px;
      animation: fadeUp 0.7s 0.6s ease backwards;
    }
    .countdown span { color: rgba(255,255,255,0.55); font-weight: 600; }

    /* Footer */
    .footer {
      position: absolute;
      bottom: 32px;
      left: 0; right: 0;
      text-align: center;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.75); }
    }
  </style>
</head>
<body>

<div class="stage">

  <p class="section-label">Squad Connect · May 2026</p>
  <div class="divider"></div>

  <h1 class="name">AI for Work</h1>

  <p style="font-size:18px;color:rgba(255,255,255,0.45);font-weight:500;margin-bottom:12px;animation:fadeUp 0.7s 0.2s ease backwards;">3 wins in 2 weeks &nbsp;·&nbsp; 1 reveal &nbsp;·&nbsp; Spinny AIR OS</p>

  <p style="font-size:14px;color:rgba(255,255,255,0.3);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:52px;animation:fadeUp 0.7s 0.28s ease backwards;">Karan Kumar</p>

  <div class="badge">

  <a class="launch-btn" href="index.html">
    Launch Presentation
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 10h12M10 4l6 6-6 6"/>
    </svg>
  </a>

  <p class="countdown">Auto-launching in <span id="timer">5</span> seconds</p>

</div>

<p class="footer">Spinny AIR OS · bitbucket.org/spinny/spinny-air</p>

<script>
  let t = 5;
  const el = document.getElementById('timer');
  const tick = setInterval(() => {
    t--;
    el.textContent = t;
    if (t <= 0) {
      clearInterval(tick);
      window.location.href = 'index.html';
    }
  }, 1000);

  // Click anywhere (outside the button) also launches immediately
  document.querySelector('.stage').addEventListener('click', function(e) {
    if (!e.target.closest('.launch-btn')) {
      clearInterval(tick);
      window.location.href = 'index.html';
    }
  });
</script>

</body>
</html>
